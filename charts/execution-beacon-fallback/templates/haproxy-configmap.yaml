{{- if .Values.haproxy.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" . }}-haproxy
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
data:
  haproxy.cfg.tmpl: |
    global
        log stdout format raw local0
        maxconn 4096

    defaults
        log global
        mode http
        option httplog
        option dontlognull
        option forwardfor
        timeout connect 5s
        timeout client  55s
        timeout server  55s

    frontend beacon
        bind *:{{ .Values.haproxy.service.port }}
        acl local_up nbsrv(local_backend) gt 0
        use_backend fallback_backend unless local_up
        default_backend local_backend

    resolvers kube-dns
        nameserver dns1 ${KUBE_DNS_IP}:53
        hold valid 10s
        hold other 30s
        resolve_retries 3
        timeout resolve 1s
        timeout retry 1s

    backend local_backend
        option httpchk GET /eth/v1/node/health
        http-check expect status 200
        server local ${LOCAL_BEACON_HOST}:${LOCAL_BEACON_PORT} check inter {{ .Values.haproxy.checkInterval }}ms fall {{ .Values.haproxy.checkFall }} rise {{ .Values.haproxy.checkRise }} resolvers kube-dns resolve-prefer ipv4

    backend fallback_backend
        option httpchk GET ${FALLBACK_PATH}/eth/v1/node/health
        http-check expect status 200
        http-request set-path ${FALLBACK_PATH}%[path]
        server fallback ${FALLBACK_HOST}:${FALLBACK_PORT} ssl verify none check inter {{ .Values.haproxy.checkInterval }}ms fall {{ .Values.haproxy.checkFall }} rise {{ .Values.haproxy.checkRise }}

    frontend stats
        bind *:8404
        http-request use-service prometheus-exporter if { path /metrics }
        stats enable
        stats uri /stats
        stats refresh 10s
{{- end }}
